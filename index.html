<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        button { background: #2ecc71; color: white; border: none; padding: 20px; font-size: 1.5rem; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>SZERVER VEZÉRLŐ</h1>
    
    <button onclick="sendToGmod()">ÜZENET KÜLDÉSE (SAY)</button>

    <script>
        function sendToGmod() {
            // Ellenőrizzük, hogy a GMod-ban vagyunk-e
            if (typeof gmodinterface !== 'undefined') {
                // Meghívjuk a Lua-ban definiált függvényt
                gmodinterface.RunMyCommand();
            } else {
                alert("Ez a gomb csak a játékon belül működik!");
            }
        }
    </script>
</body>
</html>
