<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 25px; color: #ecf0f1; text-transform: uppercase; letter-spacing: 2px; }
        .button-group { display: flex; flex-direction: column; gap: 15px; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; width: 250px; }
        button:hover { background: #27ae60; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        button:active { transform: translateY(0); }
        .btn-red { background: #e74c3c; }
        .btn-red:hover { background: #c0392b; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Szerver Vezérlő</h1>
        
        <div class="button-group">
            <button onclick="run('say Szevasz a weboldalrol!')">CHAT ÜZENET</button>
            
            <button onclick="run('kill')" class="btn-red">ÖNGYILKOSSÁG</button>
            
            <button onclick="run('act dance')">TÁNC</button>

            <button onclick="run('status')">STEAM ID / STATUS</button>

            <button onclick="run('getpos')">POZÍCIÓ (GETPOS)</button>

            <button onclick="run('thirdperson')">THIRD PERSON</button>

            <button onclick="run('firstperson')">FIRST PERSON</button>

            <button onclick="adatok()">ADATOK</button>
        </div>
    </div>

    <script>
        function run(parancs) {
            if (typeof gmodinterface !== 'undefined') {
                gmodinterface.RunMyCommand(parancs);
            } else {
                console.log("GMod parancs: " + parancs);
                alert("Ez a gomb csak GMod-on belül fut le!");
            }
        }

        function adatok() {
            run('say --- JATEKOS ADATOK ---');
            run('status');
            run('getpos');
        }
    </script>
</body>
</html>
