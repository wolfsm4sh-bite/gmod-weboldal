<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>
    <style>
        /* Teljes magasság beállítása és alap stílusok */
        body, html {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
            background-color: #121212; /* Sötét háttér */
            color: #ffffff;           /* Világos szöveg */
            display: flex;
            justify-content: center;  /* Horizontális középre igazítás */
            align-items: center;      /* Vertikális középre igazítás */
            text-align: center;
        }

        h1 {
            font-size: 3rem;          /* Nagy betűk */
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;        /* Kisebb betűk */
            opacity: 0.8;             /* Enyhén halványabb szöveg a kontraszt miatt */
        }
    </style>
</head>
<body>

    <div>
        <h1>HELLO FROM SERVER</h1>
        <p>If you can read this, the connection works.</p>
    </div>

</body>
</html>
